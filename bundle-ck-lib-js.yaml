name: bundle-ck-lib-js
description: CK.Lib.Js v1.1.0 browser client library + dev HTTP server for NATS WSS bridge testing

image:
  registry: ghcr.io/conceptkernel/ck-lib-js
  node_major: 20
  base_image: node:20-bookworm
  final_image: node:20-alpine
  runtime_profile: stable

platforms:
  - linux/amd64
  - linux/arm64

ports:
  - name: http
    container_port: 8080
  - name: nats-test
    container_port: 9222

local:
  prefix: ckjs-
  data_dir: .artifacts/ckjs-dev
  network: ckjs-dev-net
  container: ckjs-dev
