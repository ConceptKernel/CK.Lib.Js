# manual; not ck-generated
#
# compose/envoy/ck-lib-js.routes.yaml — the three blocks to merge by hand into
# the SHARED 29-localhost-tls-envoy/envoy.yaml (that Envoy terminates TLS for
# every local *.localhost project and lives outside this repo).
#
# Routing contract for https://ck-lib-js.localhost :
#   /wss  → NATS WSS  (prefix_rewrite "/", upgrade 101)  → 127.0.0.1:57291 → container 9222
#   /     → web       (200)                              → 127.0.0.1:57290 → container 8000
#
# Cert: certs/ck-lib-js.localhost{,-key}.pem (issued via mkcert; see SPEC §Cert).
# These are HAND edits — Envoy here is shared and not regenerated by ck.
# See ../../SPEC.CK-LIB-JS.v1.5.0-ENVOY-LOCALHOST.md §Envoy blocks.

# ── BLOCK 1: virtual_host ──────────────────────────────────────────────────
# Add to the shared route_config's virtual_hosts[], BEFORE the `catchall` host.
virtual_host:
  - name: ck-lib-js
    domains: ["ck-lib-js.localhost", "ck-lib-js.localhost:443", "*.ck-lib-js.localhost", "*.ck-lib-js.localhost:443"]
    routes:
      - match: { prefix: "/wss" }            # no trailing slash (pgCK v0.3 §2)
        route: { cluster: ck-lib-js_nats_wss_upstream, prefix_rewrite: "/" }
      - match: { prefix: "/" }
        route: { cluster: ck-lib-js_web_upstream }

# ── BLOCK 2: filter_chain ──────────────────────────────────────────────────
# Add to the listener's filter_chains[]. SNI → cert; reuses the shared
# *http_filter anchor (which already enables upgrade_configs: [websocket]).
filter_chain:
  - filter_chain_match:
      server_names: ["ck-lib-js.localhost", "*.ck-lib-js.localhost"]
    transport_socket:
      name: envoy.transport_sockets.tls
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
        common_tls_context:
          tls_certificates:
            - certificate_chain: { filename: certs/ck-lib-js.localhost.pem }
              private_key:        { filename: certs/ck-lib-js.localhost-key.pem }
    filters: *http_filter

# ── BLOCK 3: clusters ──────────────────────────────────────────────────────
# Append to the top-level clusters: list.
clusters:
  - name: ck-lib-js_web_upstream      # 127.0.0.1:57290 → container 8000
    connect_timeout: 5s
    type: STATIC
    load_assignment: { cluster_name: ck-lib-js_web_upstream, endpoints: [ { lb_endpoints: [ { endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 57290 } } } } ] } ] }
  - name: ck-lib-js_nats_wss_upstream # 127.0.0.1:57291 → container 9222
    connect_timeout: 5s
    type: STATIC
    load_assignment: { cluster_name: ck-lib-js_nats_wss_upstream, endpoints: [ { lb_endpoints: [ { endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 57291 } } } } ] } ] }
