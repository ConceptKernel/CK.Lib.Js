name: Publish CK.Lib.Js Bundle

on:
  push:
    tags:
      - "bundle-ck-lib-js-v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#bundle-ck-lib-js-v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push static image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/conceptkernel/ck-lib-js:${{ steps.version.outputs.version }}
            ghcr.io/conceptkernel/ck-lib-js:latest
          labels: |
            org.opencontainers.image.title=CK.Lib.Js
            org.opencontainers.image.description=CKP v3.8 JavaScript client library — static folder mount
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/ConceptKernel/CK.Lib.Js
            org.opencontainers.image.designation=ckp:static

      - name: Create release
        run: |
          gh release create bundle-ck-lib-js-v${{ steps.version.outputs.version }} \
            --title "CK.Lib.Js v${{ steps.version.outputs.version }}" \
            --notes "## Static Artifact (ckp:static)

\`\`\`bash
docker pull ghcr.io/conceptkernel/ck-lib-js:${{ steps.version.outputs.version }}
\`\`\`

Multi-platform (linux/amd64, linux/arm64), anonymous public access via GHCR."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
