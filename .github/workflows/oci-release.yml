name: OCI Release (tag v* → ghcr.io/conceptkernel/ck-lib-js)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.3.0) — used when triggering manually"
        required: true
        type: string

jobs:
  oci:
    name: Build and publish multi-platform OCI image
    # Only run on tag push or manual dispatch; ignore stray branch-push events
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building ck-lib-js:${VERSION} (event=${{ github.event_name }}, ref=${GITHUB_REF_NAME})"

      - name: Build and push static bundle
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/conceptkernel/ck-lib-js:${{ steps.version.outputs.version }}
            ghcr.io/conceptkernel/ck-lib-js:latest
          labels: |
            org.opencontainers.image.title=CK.Lib.Js
            org.opencontainers.image.description=CKP v3.8 JavaScript client library — static folder mount
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/ConceptKernel/CK.Lib.Js
            org.opencontainers.image.designation=ckp:static

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "CK.Lib.Js ${GITHUB_REF_NAME}" \
            --notes "## Static OCI Bundle (ckp:static)

\`\`\`bash
docker pull ghcr.io/conceptkernel/ck-lib-js:${{ steps.version.outputs.version }}
\`\`\`

Multi-platform (linux/amd64, linux/arm64) · anonymous public access · ~220 KB
See [CHANGELOG.md](https://github.com/ConceptKernel/CK.Lib.Js/blob/main/CHANGELOG.md) for release notes." \
            || echo "Release already exists, skipping"
