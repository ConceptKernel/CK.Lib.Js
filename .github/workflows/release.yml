name: Publish CK.Lib.Js Bundle (v1.2.0+)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.2.0)"
        required: true
        type: string

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push static image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/conceptkernel/ck-lib-js:${{ steps.version.outputs.version }}
            ghcr.io/conceptkernel/ck-lib-js:latest
          labels: |
            org.opencontainers.image.title=CK.Lib.Js
            org.opencontainers.image.description=CKP v3.8 JavaScript client library — static folder mount
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/ConceptKernel/CK.Lib.Js
            org.opencontainers.image.designation=ckp:static

      - name: Create release
        if: github.event_name == 'workflow_dispatch'
        run: |
          gh release create v${{ steps.version.outputs.version }} \
            --title "CK.Lib.Js v${{ steps.version.outputs.version }}" \
            --notes "## Static Artifact (ckp:static)

\`\`\`bash
docker pull ghcr.io/conceptkernel/ck-lib-js:${{ steps.version.outputs.version }}
\`\`\`

Multi-platform (linux/amd64, linux/arm64), anonymous public access via GHCR."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
