name: oci-publish

# v1.3.9: collapsed pipeline — one workflow, one job, all steps gated on attestation.
# Order: build+push → attest (Sigstore) → verify (Rule 2 gate) → render LATEST.md
#       → create GitHub Release → commit LATEST.md to main.
# Replaces the prior 2-workflow setup (workflow_run event was blackholed).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version from tag
        id: v
        run: |
          V="${GITHUB_REF_NAME#v}"
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "Building ck-lib-js:${V}"

      - name: Build and push multi-platform OCI bundle
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/conceptkernel/ck-lib-js:${{ steps.v.outputs.version }}
            ghcr.io/conceptkernel/ck-lib-js:latest
          labels: |
            org.opencontainers.image.title=CK.Lib.Js
            org.opencontainers.image.description=CKP v3.8 JavaScript client library — static folder mount
            org.opencontainers.image.version=${{ steps.v.outputs.version }}
            org.opencontainers.image.source=https://github.com/ConceptKernel/CK.Lib.Js
            org.opencontainers.image.designation=ckp:static

      - name: Attest SLSA Build Provenance v1
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/conceptkernel/ck-lib-js
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Wait for attestation to be queryable
        run: sleep 20

      - name: Verify attestation (Rule 2 gate — must pass before LATEST.md/release write)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh attestation verify \
            "oci://ghcr.io/conceptkernel/ck-lib-js:${{ steps.v.outputs.version }}" \
            --repo "${{ github.repository }}"

      - name: Resolve per-arch digests
        id: digests
        run: |
          set -euo pipefail
          RAW=$(docker buildx imagetools inspect \
            "ghcr.io/conceptkernel/ck-lib-js:${{ steps.v.outputs.version }}" \
            --raw)
          AMD64=$(echo "$RAW" | jq -r '.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest')
          ARM64=$(echo "$RAW" | jq -r '.manifests[] | select(.platform.architecture=="arm64" and .platform.os=="linux") | .digest')
          echo "amd64=${AMD64}" >> "$GITHUB_OUTPUT"
          echo "arm64=${ARM64}" >> "$GITHUB_OUTPUT"

      - name: Render LATEST.md
        run: |
          set -euo pipefail
          VER="${{ steps.v.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          INDEX="${{ steps.build.outputs.digest }}"
          AMD64="${{ steps.digests.outputs.amd64 }}"
          ARM64="${{ steps.digests.outputs.arm64 }}"
          RUN="${{ github.run_id }}"
          SHA="${{ github.sha }}"
          DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          cat > LATEST.md <<EOF
          # CK.Lib.Js — latest attested release

          > Rendered automatically by \`.github/workflows/oci-publish.yml\` on $DATE after \`gh attestation verify\` accepted the digest below. See [\`PROVENANCE.md\`](./PROVENANCE.md) for the policy.

          ## Static OCI bundle — \`${TAG}\`

          \`\`\`bash
          docker pull ghcr.io/conceptkernel/ck-lib-js:${VER}
          \`\`\`

          ### Per-architecture digests

          | arch  | Pull URI                                | Also tagged | Digest |
          |-------|-----------------------------------------|-------------|--------|
          | amd64 | \`ghcr.io/conceptkernel/ck-lib-js:${VER}\` | \`latest\`  | \`${AMD64}\` |
          | arm64 | \`ghcr.io/conceptkernel/ck-lib-js:${VER}\` | \`latest\`  | \`${ARM64}\` |

          ### Artifact properties

          |                       |                                                                              |
          |-----------------------|------------------------------------------------------------------------------|
          | Artifact type         | OCI image index (multi-arch); \`org.opencontainers.image.designation=ckp:static\` |
          | Index digest          | \`${INDEX}\`                                                                  |
          | Designation           | \`ckp:static\`                                                                |

          ## GitHub provenance (SLSA Build Provenance v1)

          |                       |                                                                              |
          |-----------------------|------------------------------------------------------------------------------|
          | Workflow run          | https://github.com/${{ github.repository }}/actions/runs/${RUN}              |
          | Built from commit     | [\`${SHA}\`](https://github.com/${{ github.repository }}/commit/${SHA})       |
          | Tag                   | [${TAG}](https://github.com/${{ github.repository }}/releases/tag/${TAG})     |
          | Attestation generator | [\`actions/attest-build-provenance@v1\`](https://github.com/actions/attest-build-provenance) (Sigstore-backed) |
          | Verify locally        | \`gh attestation verify oci://ghcr.io/conceptkernel/ck-lib-js:${VER} --repo ${{ github.repository }}\` |

          ## Use as static layer

          In your \`bundle.yaml\` (per SPEC.OCI.BUNDLE.v0.2):

          \`\`\`yaml
          spec_version: 0.2
          static_web:
            - source_image: ghcr.io/conceptkernel/ck-lib-js:${VER}
              route: /cklib
          \`\`\`

          Browser consumption (after the bundle is mounted at \`/cklib/\`):

          \`\`\`html
          <script type="module">
            import { CKPage } from '/cklib/ck-page.js';
            await CKPage.init();
          </script>
          \`\`\`

          See [\`README.md\`](./README.md) for the full ESM export surface, [\`CHANGELOG.md\`](./CHANGELOG.md) for release notes, [\`COMPLIANCE.md\`](./COMPLIANCE.md) for the v3.8 transport contract, [\`PROVENANCE.md\`](./PROVENANCE.md) for the release policy.
          EOF

      - name: Create GitHub Release (bare-tag title)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file LATEST.md \
            || echo "Release already exists, skipping"

      - name: Commit LATEST.md to main
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain LATEST.md)" ]; then
            git add LATEST.md
            git commit -m "docs: LATEST.md → ${GITHUB_REF_NAME} (auto, attestation-gated)"
            git push origin HEAD:main
          else
            echo "LATEST.md already up to date for ${GITHUB_REF_NAME}"
          fi
