name: oci-publish

# v1.3.9: collapsed pipeline — one workflow, one job, all steps gated on attestation.
# Order: build+push → attest (Sigstore) → verify (Rule 2 gate) → render LATEST.md
#       → create GitHub Release → commit LATEST.md to main.
# Replaces the prior 2-workflow setup (workflow_run event was blackholed).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # Checkout the PUSHED TAG (default ref) — NEVER a fixed branch. Building `ref: main`
      # while releases are tagged on task branches shipped stale v1.4.0 bytes as :1.4.1/:1.4.2
      # (the 2026-06-11 packaging-integrity incident; see CHANGELOG [1.4.3]).
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version from tag
        id: v
        run: |
          V="${GITHUB_REF_NAME#v}"
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "Building ck-lib-js:${V}"

      - name: Build and push multi-platform OCI bundle
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/conceptkernel/ck-lib-js:${{ steps.v.outputs.version }}
            ghcr.io/conceptkernel/ck-lib-js:latest
          # Labels per SPEC.OCI.BUNDLE.v0.3 §2.1 (Shape A manifest labels — Required + Recommended set).
          labels: |
            org.opencontainers.image.title=CK.Lib.Js
            org.opencontainers.image.description=CKP NATS WSS client (stripped, JWT) — static folder mount
            org.opencontainers.image.version=${{ steps.v.outputs.version }}
            org.opencontainers.image.source=https://github.com/ConceptKernel/CK.Lib.Js
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.designation=ckp:static

      - name: Attest SLSA Build Provenance v1
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/conceptkernel/ck-lib-js
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Wait for attestation to be queryable
        run: sleep 20

      - name: Verify attestation (Rule 2 gate — must pass before LATEST.md/release write)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh attestation verify \
            "oci://ghcr.io/conceptkernel/ck-lib-js:${{ steps.v.outputs.version }}" \
            --repo "${{ github.repository }}"

      # ── npm publish (provenance-attested), gated on the OCI release being sound ──────────────
      # Reuses the job's id-token:write (the same OIDC identity that signs the OCI attestation).
      # `--provenance` mints a Sigstore SLSA attestation linking the package to this tag + run.
      - name: Set up Node for npm publish
        if: ${{ vars.NPM_PUBLISH == 'true' }}   # npm DEFERRED — set repo var NPM_PUBLISH=true (after npm auth lands) to activate
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm with provenance (idempotent)
        if: ${{ vars.NPM_PUBLISH == 'true' }}
        env:
          # Token path: set the NPM_TOKEN repo secret (npm automation/granular token).
          # Token-less path: leave NPM_TOKEN unset and configure npm Trusted Publishing
          # (OIDC) for @conceptkernel/cklib on npmjs.org — then npm uses this job's id-token.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VER="${{ steps.v.outputs.version }}"
          PKG_VER="$(node -p "require('./package.json').version")"
          if [ "${PKG_VER}" != "${VER}" ]; then
            echo "::error::package.json version (${PKG_VER}) != tag (${VER}); release ritual must bump package.json"
            exit 1
          fi
          if npm view "@conceptkernel/cklib@${VER}" version >/dev/null 2>&1; then
            echo "npm: @conceptkernel/cklib@${VER} already published — skipping (re-run safe)."
          else
            npm publish --provenance --access public
          fi

      - name: Confirm npm — version live, 'latest' points here, provenance attached
        if: ${{ vars.NPM_PUBLISH == 'true' }}
        run: |
          set -euo pipefail
          VER="${{ steps.v.outputs.version }}"
          PUBLISHED="$(npm view "@conceptkernel/cklib@${VER}" version)"
          LATEST="$(npm view "@conceptkernel/cklib" dist-tags.latest)"
          ATT="$(npm view "@conceptkernel/cklib@${VER}" --json | jq -r '.dist.attestations.url // "MISSING"')"
          echo "npm published=${PUBLISHED} | dist-tag latest=${LATEST} | provenance=${ATT}"
          test "${PUBLISHED}" = "${VER}"   # the version is live on the registry
          test "${LATEST}" = "${VER}"      # 'latest' resolves to this release (the confirmation gate)
          if [ "${ATT}" = "MISSING" ]; then
            echo "::warning::npm provenance attestation NOT found for ${VER} — publish lacked --provenance or OIDC was unavailable"
          else
            echo "npm provenance attestation present → ${ATT}"
          fi

      - name: Resolve per-arch digests
        id: digests
        run: |
          set -euo pipefail
          RAW=$(docker buildx imagetools inspect \
            "ghcr.io/conceptkernel/ck-lib-js:${{ steps.v.outputs.version }}" \
            --raw)
          AMD64=$(echo "$RAW" | jq -r '.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest')
          ARM64=$(echo "$RAW" | jq -r '.manifests[] | select(.platform.architecture=="arm64" and .platform.os=="linux") | .digest')
          echo "amd64=${AMD64}" >> "$GITHUB_OUTPUT"
          echo "arm64=${ARM64}" >> "$GITHUB_OUTPUT"

      - name: Render LATEST.md
        run: |
          set -euo pipefail
          VER="${{ steps.v.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          INDEX="${{ steps.build.outputs.digest }}"
          AMD64="${{ steps.digests.outputs.amd64 }}"
          ARM64="${{ steps.digests.outputs.arm64 }}"
          RUN="${{ github.run_id }}"
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          cat > LATEST.md <<EOF
          # CK.Lib.Js — latest published artifacts

          One publishable surface ships from this repo today: the **OCI static bundle** (\`ckp:static\`) per [SPEC.OCI.BUNDLE.v0.4](https://github.com/sporaxis-com/oci-germination/blob/main/SPEC.OCI.BUNDLE.v0.4.md), attestation-gated (this file renders only after \`gh attestation verify\` passes). The npm package \`@conceptkernel/cklib\` is staged in \`package.json\` (publish **deferred** until npm auth lands; the workflow's npm steps are gated on repo var \`NPM_PUBLISH\`). See [Repo packages view](https://github.com/${REPO}/pkgs/container/ck-lib-js) for the full version history.

          ## CK.Lib.Js OCI bundle — \`${TAG}\`

          Per [\`PROVENANCE.md\`](./PROVENANCE.md), every digest below verifies under \`gh attestation verify oci://… --repo ${REPO}\`. Versions before v1.3.9 predate the attestation wiring and never appear here — re-publishing them would change digests and break the immutability promise.

          \`docker pull ghcr.io/conceptkernel/ck-lib-js:${VER}\` → declare as a \`static_web\` (routed) or \`layer_sources\` (additive merge) entry in your \`bundle.yaml\` per SPEC.OCI.BUNDLE.v0.4. The bundle lands the facade + transport + cache at image root (\`/ck.js\`, \`/ck-client.js\`, \`/ck-store.js\`, \`/vendor/\`) ready for spec-standard \`COPY --from=cklib_source / dest/\`.

          | arch  | Pull URI                                | Also tagged | Digest                                                                  | Created (UTC)       |
          |-------|-----------------------------------------|-------------|-------------------------------------------------------------------------|---------------------|
          | amd64 | \`ghcr.io/conceptkernel/ck-lib-js:${VER}\` | \`latest\`  | \`${AMD64}\` | ${DATE} |
          | arm64 | \`ghcr.io/conceptkernel/ck-lib-js:${VER}\` | \`latest\`  | \`${ARM64}\` | ${DATE} |

          |                       |                                                                                                |
          |-----------------------|------------------------------------------------------------------------------------------------|
          | Artifact type         | OCI image index (multi-arch); \`org.opencontainers.image.designation=ckp:static\`               |
          | Aggregate index       | \`ghcr.io/conceptkernel/ck-lib-js:${VER}\` (also tagged \`latest\`)                              |
          | Aggregate digest      | \`${INDEX}\`                                                                                    |
          | Provenance            | SLSA Build Provenance v1, Sigstore-backed, pushed as OCI referrer                              |
          | Built by              | [Workflow run #${RUN}](https://github.com/${REPO}/actions/runs/${RUN})                          |
          | Built from commit     | [\`${SHA}\`](https://github.com/${REPO}/commit/${SHA})                                          |
          | Verify (CLI)          | \`gh attestation verify oci://ghcr.io/conceptkernel/ck-lib-js:${VER} --repo ${REPO}\`            |
          | Release notes         | https://github.com/${REPO}/releases/tag/${TAG}                                                  |
          | Repo packages view    | https://github.com/${REPO}/pkgs/container/ck-lib-js                                             |

          ## Verifying any artifact above

          \`\`\`sh
          # Multi-arch index (Docker's manifest negotiation picks the right arch)
          gh attestation verify oci://ghcr.io/conceptkernel/ck-lib-js:${VER} \\
            --repo ${REPO}

          # A specific per-arch leaf
          gh attestation verify oci://ghcr.io/conceptkernel/ck-lib-js@${AMD64} \\
            --repo ${REPO}
          \`\`\`

          A successful verify means: signed by GitHub's Fulcio CA against the OIDC token of the ${TAG} \`oci-publish\` workflow run, recorded in Sigstore's Rekor transparency log, subject digest matches the pulled artifact.

          ## Use as static layer

          In your \`bundle.yaml\` (per [SPEC.OCI.BUNDLE.v0.3](https://github.com/sporaxis-com/oci-germination/blob/main/SPEC.OCI.BUNDLE.v0.3.md)):

          \`\`\`yaml
          spec_version: 0.3
          # Shape A — routed mount under a path the FastAPI/static server exposes:
          static_web:
            - source_image: ghcr.io/conceptkernel/ck-lib-js:${VER}
              route: /cklib
              attestation_repo: ${REPO}
          # …or additive filesystem merge into the final image:
          layer_sources:
            - source_image: ghcr.io/conceptkernel/ck-lib-js:${VER}
              into: /app/cklib/
              attestation_repo: ${REPO}
          \`\`\`

          The build MUST run \`gh attestation verify oci://ghcr.io/conceptkernel/ck-lib-js:${VER} --repo ${REPO}\` before the consuming image is pushed (SPEC.OCI.BUNDLE.v0.3 §4 build-time gate).

          Browser consumption (after the bundle is mounted at \`/cklib/\`):

          \`\`\`html
          <script type="module">
            import { CKClient } from '/cklib/ck-client.js';
            const ck = new CKClient({ kernel: 'pgCK.Task' });
            await ck.connect();
          </script>
          \`\`\`

          ## Pin policy

          - \`latest\` tracks the most recent attested CK.Lib.Js tag on the multi-arch image index. Both arches resolve transparently via Docker's manifest negotiation — no \`latest-amd64\` / \`latest-arm64\` split.
          - Tagged versions are immutable on GHCR. Pin by version (\`${VER}\`) in production bundles; use \`latest\` only for development.
          - The OCI bundle is anonymous public pull — no GHCR auth required.
          - Per [\`PROVENANCE.md\`](./PROVENANCE.md) Rule 2: do not consider an artifact "shipped" if its digest does not verify under \`gh attestation verify\`.

          See [\`CHANGELOG.md\`](./CHANGELOG.md) for what changed per version, [\`COMPLIANCE.md\`](./COMPLIANCE.md) for the transport contract, [\`README.md\`](./README.md) for the \`CK\` concept-kernel API.

          ---

          > Rendered automatically by \`.github/workflows/oci-publish.yml\` on ${DATE} after \`gh attestation verify\` accepted the aggregate digest above.
          EOF

      - name: Create GitHub Release (bare-tag title)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file LATEST.md \
            || echo "Release already exists, skipping"

      - name: Commit LATEST.md to main
        # The working tree is the TAG checkout; LATEST.md lives on main. Stash the render,
        # switch to origin/main explicitly, and commit there — never push the tag's tree to main.
        run: |
          set -euo pipefail
          cp LATEST.md "${RUNNER_TEMP}/LATEST.md"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -f -B publish-latest origin/main
          cp "${RUNNER_TEMP}/LATEST.md" LATEST.md
          if [ -n "$(git status --porcelain LATEST.md)" ]; then
            git add LATEST.md
            git commit -m "docs: LATEST.md → ${GITHUB_REF_NAME} (auto, attestation-gated)"
            git push origin HEAD:main
          else
            echo "LATEST.md already up to date for ${GITHUB_REF_NAME}"
          fi
