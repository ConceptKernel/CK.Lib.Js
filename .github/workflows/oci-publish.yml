name: oci-publish

# v1.3.8 iteration: add SLSA Build Provenance v1 attestation via actions/attest-build-provenance@v1.
# Per PROVENANCE.md Rule 1 / "What's enforced" table, this is the canonical builder of
# ghcr.io/conceptkernel/ck-lib-js:<ver> and the source of the attestation that
# update-latest-md.yml verifies before writing LATEST.md.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write       # tags, release object (later)
  packages: write       # GHCR push
  id-token: write       # Sigstore OIDC signing for attest-build-provenance
  attestations: write   # attestations API

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Echo trigger
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Ref name: ${{ github.ref_name }}"
          echo "SHA: ${{ github.sha }}"
          echo "Run ID: ${{ github.run_id }}"

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version from tag
        id: v
        run: |
          V="${GITHUB_REF_NAME#v}"
          echo "version=${V}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-platform OCI bundle
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/conceptkernel/ck-lib-js:${{ steps.v.outputs.version }}
            ghcr.io/conceptkernel/ck-lib-js:latest
          labels: |
            org.opencontainers.image.title=CK.Lib.Js
            org.opencontainers.image.description=CKP v3.8 JavaScript client library — static folder mount
            org.opencontainers.image.version=${{ steps.v.outputs.version }}
            org.opencontainers.image.source=https://github.com/ConceptKernel/CK.Lib.Js
            org.opencontainers.image.designation=ckp:static

      # SLSA Build Provenance v1, signed by GitHub's Fulcio CA, recorded in Sigstore Rekor.
      # Pushed as an OCI referrer so `gh attestation verify oci://...` can find it.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/conceptkernel/ck-lib-js
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
