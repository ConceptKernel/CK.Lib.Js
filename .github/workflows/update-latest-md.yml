name: update-latest-md

# Per PROVENANCE.md Rule 3: the ONLY allowed writer of LATEST.md.
# Triggers after oci-publish.yml completes successfully on a tag push.
# Verifies the published artifact's SLSA Build Provenance v1 attestation
# via `gh attestation verify` (Rule 2) before rendering and committing LATEST.md.
# If verify fails, LATEST.md stays at its prior state.

on:
  workflow_run:
    workflows: ["oci-publish"]
    types: [completed]

permissions:
  contents: write   # commit + push LATEST.md
  packages: read    # inspect GHCR manifests
  id-token: read    # attestation verify

jobs:
  render:
    if: github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve tag + version
        id: meta
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          VER="${TAG#v}"
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          echo "run_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      - name: Verify build provenance attestation (Rule 2 gate)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh attestation verify \
            "oci://ghcr.io/conceptkernel/ck-lib-js:${{ steps.meta.outputs.version }}" \
            --repo "${{ github.repository }}"

      - name: Pull manifest + per-arch digests
        id: digests
        run: |
          set -euo pipefail
          # Index digest from registry
          INDEX_DIGEST=$(docker buildx imagetools inspect \
            "ghcr.io/conceptkernel/ck-lib-js:${{ steps.meta.outputs.version }}" \
            --format "{{ .Manifest.Digest }}")
          echo "index=${INDEX_DIGEST}" >> "$GITHUB_OUTPUT"

          # Per-arch digests from the index
          RAW=$(docker buildx imagetools inspect \
            "ghcr.io/conceptkernel/ck-lib-js:${{ steps.meta.outputs.version }}" \
            --raw)
          AMD64=$(echo "$RAW" | jq -r '.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest')
          ARM64=$(echo "$RAW" | jq -r '.manifests[] | select(.platform.architecture=="arm64" and .platform.os=="linux") | .digest')
          echo "amd64=${AMD64}" >> "$GITHUB_OUTPUT"
          echo "arm64=${ARM64}" >> "$GITHUB_OUTPUT"

      - name: Render LATEST.md
        run: |
          set -euo pipefail
          VER="${{ steps.meta.outputs.version }}"
          TAG="${{ steps.meta.outputs.tag }}"
          INDEX="${{ steps.digests.outputs.index }}"
          AMD64="${{ steps.digests.outputs.amd64 }}"
          ARM64="${{ steps.digests.outputs.arm64 }}"
          RUN_ID="${{ steps.meta.outputs.run_id }}"
          SHA="${{ steps.meta.outputs.run_sha }}"
          DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          cat > LATEST.md <<EOF
          # CK.Lib.Js — latest attested release

          > Rendered automatically by \`.github/workflows/update-latest-md.yml\` on $DATE after \`gh attestation verify\` accepted the digest below. See [\`PROVENANCE.md\`](./PROVENANCE.md) for the policy.

          ## Static OCI bundle — \`${TAG}\`

          \`\`\`bash
          docker pull ghcr.io/conceptkernel/ck-lib-js:${VER}
          \`\`\`

          ### Per-architecture digests

          | arch  | Pull URI                                | Also tagged | Digest |
          |-------|-----------------------------------------|-------------|--------|
          | amd64 | \`ghcr.io/conceptkernel/ck-lib-js:${VER}\` | \`latest\`  | \`${AMD64}\` |
          | arm64 | \`ghcr.io/conceptkernel/ck-lib-js:${VER}\` | \`latest\`  | \`${ARM64}\` |

          ### Artifact properties

          |                       |                                                                              |
          |-----------------------|------------------------------------------------------------------------------|
          | Artifact type         | OCI image index (multi-arch); \`org.opencontainers.image.designation=ckp:static\` |
          | Index digest          | \`${INDEX}\`                                                                  |
          | Designation           | \`ckp:static\`                                                                |

          ## GitHub provenance (SLSA Build Provenance v1)

          |                       |                                                                              |
          |-----------------------|------------------------------------------------------------------------------|
          | Workflow run          | https://github.com/${{ github.repository }}/actions/runs/${RUN_ID}           |
          | Built from commit     | [\`${SHA}\`](https://github.com/${{ github.repository }}/commit/${SHA})       |
          | Tag                   | [${TAG}](https://github.com/${{ github.repository }}/releases/tag/${TAG})     |
          | Attestation generator | [\`actions/attest-build-provenance@v1\`](https://github.com/actions/attest-build-provenance) (Sigstore-backed) |
          | Verify locally        | \`gh attestation verify oci://ghcr.io/conceptkernel/ck-lib-js:${VER} --repo ${{ github.repository }}\` |

          ## Use as static layer

          In your \`bundle.yaml\` (per [SPEC.OCI.BUNDLE.v0.2](https://github.com/sporaxis-com/oci-germination)):

          \`\`\`yaml
          spec_version: 0.2
          static_web:
            - source_image: ghcr.io/conceptkernel/ck-lib-js:${VER}
              route: /cklib
          \`\`\`

          Browser consumption (after the bundle is mounted at \`/cklib/\`):

          \`\`\`html
          <script type="module">
            import { CKPage } from '/cklib/ck-page.js';
            await CKPage.init();
          </script>
          \`\`\`

          See [\`README.md\`](./README.md) for the full ESM export surface, [\`CHANGELOG.md\`](./CHANGELOG.md) for release notes, [\`COMPLIANCE.md\`](./COMPLIANCE.md) for the v3.8 transport contract, [\`PROVENANCE.md\`](./PROVENANCE.md) for the release policy.
          EOF

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain LATEST.md)" ]; then
            git add LATEST.md
            git commit -m "docs: LATEST.md → ${{ steps.meta.outputs.tag }} (auto, attestation-gated)"
            git push origin main
          else
            echo "LATEST.md already up to date for ${{ steps.meta.outputs.tag }}"
          fi
