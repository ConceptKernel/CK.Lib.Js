name: Publish to npm & GHCR

on:
  push:
    tags:
      - "v*"

jobs:
  npm:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  oci:
    name: Build and publish OCI image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/conceptkernel/bundle-ck-lib-js" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          labels: |
            org.opencontainers.image.title=CK.Lib.Js
            org.opencontainers.image.description=CKP v3.8 JavaScript client library + dev server
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=https://github.com/ConceptKernel/CK.Lib.Js

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [npm, oci]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## CK.Lib.Js v${{ steps.version.outputs.version }}

            ### npm Package
            ```bash
            npm install @conceptkernel/cklib
            ```
            [View on npm](https://www.npmjs.com/package/@conceptkernel/cklib)

            ### OCI Image (Public, Anonymous Access)
            ```bash
            docker pull ghcr.io/conceptkernel/bundle-ck-lib-js:${{ steps.version.outputs.version }}
            ```
            [View on GHCR](https://github.com/ConceptKernel/CK.Lib.Js/pkgs/container/bundle-ck-lib-js)
